<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Caregiver Dashboard</title>
    <style>
        body {
            width: 90%;
            margin: auto;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }

        .status-box {
            padding: 40px;
            text-align: center;
            font-size: 24px;
            color: white;
            border-radius: 10px;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #confirm-btn {
            display: none;
            padding: 20px;
            font-size: 20px;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Caregiver Dashboard</h1>

    <div id="status-box" class="status-box">System Initializing...</div>

    <div class="data-grid">
        <div>Temp: <span id="v-temp">--</span>°C</div>
        <div>Pulse: <span id="v-pulse">--</span> bpm</div>
        <div>Sodium: <span id="v-sodium">--</span> mmol/L</div>
        <div>Battery: <span id="v-battery">--</span>%</div>
    </div>

    <button id="confirm-btn" onclick="acknowledgeAlert()">Confirm Critical Alert</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Initialize Firebase with your project credentials
        const firebaseConfig = {
            apiKey: "AIzaSyC06_AxWn8ARAp-TMpEBqKYuj6b5L_sguI",
            authDomain: "hydromemory-14191.firebaseapp.com",
            databaseURL: "https://hydromemory-14191-default-rtdb.firebaseio.com",
            projectId: "hydromemory-14191",
            storageBucket: "hydromemory-14191.firebasestorage.app",
            messagingSenderId: "859458916013",
            appId: "1:859458916013:web:1dbb7ee57c46826cb48024"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let escalationTimer;

        // Monitor patient_status in real-time
        db.ref('patient_status').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Update UI metrics
            document.getElementById('v-temp').innerText = data.temp;
            document.getElementById('v-pulse').innerText = data.pulse;
            document.getElementById('v-sodium').innerText = data.sodium;
            document.getElementById('v-battery').innerText = data.battery;

            const statusBox = document.getElementById('status-box');
            const confirmBtn = document.getElementById('confirm-btn');

            // Business Logic Hierarchy
            if (data.battery <= 20) {
                // Requirement: Low Battery Alert
                statusBox.style.backgroundColor = 'orange';
                statusBox.innerText = 'Warning: Recharge the patch (Battery <= 20%)';
                confirmBtn.style.display = 'none';
            } else if (data.alertLevel === 'red' && data.acknowledged === false) {
                // Requirement: Critical physiological alert
                statusBox.style.backgroundColor = '#ff4d4d';
                statusBox.innerText = data.instruction;
                confirmBtn.style.display = 'block';

                // Requirement: Escalation protocol (10s timeout)
                escalationTimer = setTimeout(() => { triggerSMSBackup(); }, 10000);
            } else {
                // Default state
                statusBox.style.backgroundColor = '#28a745';
                statusBox.innerText = 'System Operational';
                confirmBtn.style.display = 'none';
            }
        });

        // Acknowledgement functionality
        function acknowledgeAlert() {
            clearTimeout(escalationTimer);
            db.ref('patient_status').update({ acknowledged: true });
            document.getElementById('confirm-btn').style.display = 'none';
            console.log("Caregiver acknowledged the alert.");
        }

        // Simulated SMS trigger
        function triggerSMSBackup() {
            alert("CRITICAL: No response. SMS sent to emergency contacts!");
        }
    </script>
</body>
</html>
